name: Deploy

on:
  push:
    branches: [main]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"

jobs:
  verify:
    name: Pre-Deploy Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test (registry + imports)
        run: |
          python -c "from ghostagency.core.agent_registry import AGENT_REGISTRY; print(f'{len(AGENT_REGISTRY)} agents registered ✓')"
          echo "Smoke test passed — ready for manual deploy"
        env:
          GHOST_MOCK_AI: "true"
